name: 'Telegram Notifier'
description: 'Отправляет уведомления в Telegram о событиях в репозиториях GitHub'

inputs:
  event_type:
    description: 'Тип события (push, pr_opened, pr_merged, issue, deadline, branch_created)'
    required: true
  repo_name:
    description: 'Название репозитория'
    required: true
  branch:
    description: 'Название ветки'
    required: false
  actor:
    description: 'Автор действия'
    required: true
  commit_message:
    description: 'Описание коммита/PR/задачи/ветки'
    required: false
  commit_url:
    description: 'URL коммита/PR/задачи'
    required: false
  deadline_info:
    description: 'JSON с деталями дедлайна'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Установка Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Установка зависимостей
      run: |
        python -m pip install --upgrade pip
        pip install requests
      shell: bash
    
    - name: Отправка уведомления
      run: python ${{ github.action_path }}/send_notification.py
      shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        EVENT_TYPE: ${{ inputs.event_type }}
        REPO_NAME: ${{ inputs.repo_name }}
        BRANCH: ${{ inputs.branch }}
        ACTOR: ${{ inputs.actor }}
        COMMIT_MESSAGE: ${{ inputs.commit_message }}
        COMMIT_URL: ${{ inputs.commit_url }}
        DEADLINE_INFO: ${{ inputs.deadline_info }}
