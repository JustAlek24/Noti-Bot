name: Отправить в Telegram

on:
  repository_dispatch:
    types: [send]

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Отправить
        run: python send_notification.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EVENT_TYPE: ${{ github.event.client_payload.event_type }}
          REPO_NAME: ${{ github.event.client_payload.repo_name }}
          BRANCH: ${{ github.event.client_payload.branch }}
          ACTOR: ${{ github.event.client_payload.actor }}
          COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
          COMMIT_URL: ${{ github.event.client_payload.commit_url }}
          DEADLINE_INFO: ${{ toJson(github.event.client_payload.deadline_info) }}
